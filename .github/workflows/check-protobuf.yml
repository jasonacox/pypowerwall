name: Check Protobuf

on:
  push:
    paths:
      - '**.proto'
      - '**_pb2.py'
  pull_request:
    paths:
      - '**.proto'
      - '**_pb2.py'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check-protobuf:
    name: "Verify pb2 files are up to date"
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Regenerate protobuf files (dual toolchain)
        # gen_proto.sh provisions two throwaway venvs (legacy protobuf 4.25 for
        # tesla/V2024_06, latest protoc for V2026_06). Python 3.12 has wheels for
        # both grpcio-tools 1.62.x and 1.81.x, so point both at this interpreter.
        env:
          LEGACY_PY: python
          V2_PY: python
        run: bash tools/gen_proto.sh

      - name: Check for uncommitted changes
        run: |
          git diff --exit-code -- '**/*_pb2.py' || {
            echo ""
            echo "ERROR: pb2 files are out of date with their .proto sources."
            echo "Run the protoc commands above locally and commit the updated pb2 files."
            exit 1
          }
